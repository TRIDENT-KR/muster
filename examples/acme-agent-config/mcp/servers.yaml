# Org-approved MCP servers. Secrets are ${ENV_VAR} references — never literals.
servers:
  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
  context7:
    url: "https://mcp.context7.com/mcp"
